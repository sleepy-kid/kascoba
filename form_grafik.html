<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Grafik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="bg-gray-100 p-4 font-sans text-gray-800">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md p-6 border-t-4 border-purple-500">
        <h2 class="text-xl font-bold mb-4 text-center">📈 Form Visual Analytics</h2>
        <div class="mb-8">
            <label class="block text-sm font-semibold mb-1 text-gray-600">📅 Pilih Bulan & Tahun</label>
            <input type="month" id="bulan_tahun" class="w-full border border-gray-300 p-3 rounded-lg outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500">
        </div>
        <button onclick="kirimData()" class="w-full bg-purple-600 text-white font-bold py-3 rounded-lg hover:bg-purple-700 active:scale-95 transition-transform shadow-lg">
            🚀 Buka Grafik
        </button>
    </div>
    <script>
        let tg = window.Telegram.WebApp; tg.expand();
        let now = new Date();
        let y = now.getFullYear();
        let m = (now.getMonth() + 1).toString().padStart(2, '0');
        document.getElementById('bulan_tahun').value = `${y}-${m}`;
        
        function kirimData() {
            let val = document.getElementById('bulan_tahun').value; 
            if (!val) { tg.showAlert("⚠️ Pilih bulan dan tahun!"); return; }
            let parts = val.split('-');
            let target_date = parts[1] + "-" + parts[0]; 
            tg.sendData("GRAFIK|" + target_date);
        }
    </script>
</body>
</html>
