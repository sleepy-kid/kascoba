<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Cari Sales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="bg-gray-100 p-4 font-sans text-gray-800">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md p-6 border-t-4 border-blue-500">
        <h2 class="text-xl font-bold mb-4 text-center">🔍 Form Pengecekan Sales</h2>
        
        <div class="mb-4">
            <label class="block text-sm font-semibold mb-1 text-gray-600">👤 Nama Sales</label>
            <input type="text" id="nama" placeholder="Contoh: Intan" class="w-full border border-gray-300 p-3 rounded-lg bg-gray-50 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
        </div>

        <div class="mb-4">
            <label class="block text-sm font-semibold mb-1 text-gray-600">📅 Dari Tanggal</label>
            <input type="date" id="tgl_awal" class="w-full border border-gray-300 p-3 rounded-lg bg-gray-50 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
        </div>

        <div class="mb-8">
            <label class="block text-sm font-semibold mb-1 text-gray-600">📅 Sampai Tanggal</label>
            <input type="date" id="tgl_akhir" class="w-full border border-gray-300 p-3 rounded-lg bg-gray-50 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
        </div>

        <button onclick="kirimData()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 active:scale-95 transition-transform shadow-lg">
            🚀 Tampilkan Data
        </button>
    </div>

    <script>
        // Inisialisasi Telegram Web App
        let tg = window.Telegram.WebApp;
        tg.expand(); // Paksa buka full screen di HP

        // Set default kalender ke hari ini
        document.getElementById('tgl_akhir').valueAsDate = new Date();
        let dateAwal = new Date();
        dateAwal.setDate(1); // Set ke tanggal 1 bulan ini
        document.getElementById('tgl_awal').valueAsDate = dateAwal;

        function kirimData() {
            let nama = document.getElementById('nama').value;
            let tgl_awal = document.getElementById('tgl_awal').value;
            let tgl_akhir = document.getElementById('tgl_akhir').value;

            if (!nama || !tgl_awal || !tgl_akhir) {
                tg.showAlert("⚠️ Harap ketik nama sales terlebih dahulu!");
                return;
            }

            // Gabungkan data untuk dikirim balik ke Bot Python
            let dataKirim = "SALES|" + nama + "|" + tgl_awal + "|" + tgl_akhir;
            tg.sendData(dataKirim); 
        }
    </script>
</body>
</html>
