<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Kas</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: var(--tg-theme-bg-color, #ffffff); color: var(--tg-theme-text-color, #000000); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="date"], input[type="number"], input[type="text"], select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; background-color: var(--tg-theme-secondary-bg-color, #f1f1f1); color: var(--tg-theme-text-color, #000000); }
        button { width: 100%; padding: 12px; background-color: var(--tg-theme-button-color, #3390ec); color: var(--tg-theme-button-text-color, #ffffff); border: none; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Form Input Kas</h2>

    <div class="form-group">
        <label for="tanggal">Tanggal:</label>
        <input type="date" id="tanggal" required>
    </div>

    <div class="form-group">
        <label for="kategori">Kategori:</label>
        <select id="kategori" required>
            <option value="ATK">ATK</option>
            <option value="Konsumsi">Konsumsi</option>
            <option value="Transport">Transport</option>
            <option value="Operasional">Operasional</option>
            <option value="Kegiatan Dakwah">Kegiatan Dakwah</option>
        </select>
    </div>

    <div class="form-group">
        <label for="keterangan">Keterangan:</label>
        <input type="text" id="keterangan" placeholder="Contoh: Beli kertas HVS" required>
    </div>

    <div class="form-group">
        <label for="pemasukan">Pemasukan (Rp):</label>
        <input type="number" id="pemasukan" placeholder="Isi 0 jika tidak ada" value="0" required>
    </div>

    <div class="form-group">
        <label for="pengeluaran">Pengeluaran (Rp):</label>
        <input type="number" id="pengeluaran" placeholder="Isi 0 jika tidak ada" value="0" required>
    </div>

    <button onclick="kirimData()">Kirim Data ke Bot</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        document.getElementById('tanggal').valueAsDate = new Date();

        function kirimData() {
            let tanggal = document.getElementById('tanggal').value;
            let kategori = document.getElementById('kategori').value;
            let keterangan = document.getElementById('keterangan').value;
            let pemasukan = document.getElementById('pemasukan').value;
            let pengeluaran = document.getElementById('pengeluaran').value;

            if(!tanggal || !keterangan) {
                tg.showAlert("Tanggal dan Keterangan harus diisi!");
                return;
            }

            let dataKas = {
                tanggal: tanggal,
                kategori: kategori,
                keterangan: keterangan,
                pemasukan: parseInt(pemasukan),
                pengeluaran: parseInt(pengeluaran)
            };

            tg.sendData(JSON.stringify(dataKas));
        }
    </script>
</body>
</html>
