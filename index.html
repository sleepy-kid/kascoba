<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Kas</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select {
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;
            box-sizing: border-box;
            background-color: var(--tg-theme-secondary-bg-color, #f4f4f5);
            color: var(--tg-theme-text-color, #000000);
        }
    </style>
</head>
<body>
    <h2>Input Kas Baru</h2>
    <div class="form-group">
        <label>Tanggal:</label>
        <input type="date" id="tanggal" required>
    </div>
    <div class="form-group">
        <label>Kategori:</label>
        <select id="kategori">
            <option value="ATK">ATK</option>
            <option value="Konsumsi">Konsumsi</option>
            <option value="Transport">Transport</option>
            <option value="Operasional">Operasional</option>
            <option value="Kegiatan Dakwah">Kegiatan Dakwah</option>
        </select>
    </div>
    <div class="form-group">
        <label>Keterangan:</label>
        <input type="text" id="keterangan" placeholder="Contoh: Beli Kertas HVS" required>
    </div>
    <div class="form-group">
        <label>Pemasukan (Rp):</label>
        <input type="number" id="pemasukan" value="0" required>
    </div>
    <div class="form-group">
        <label>Pengeluaran (Rp):</label>
        <input type="number" id="pengeluaran" value="0" required>
    </div>
   

    <script>
        // Inisialisasi Telegram Web App
        let tg = window.Telegram.WebApp;
        tg.expand(); // Memperluas tampilan web app ke ukuran penuh

        // Memunculkan tombol "Main Button" bawaan Telegram di bawah layar
        tg.MainButton.setText("SIMPAN DATA KAS");
        tg.MainButton.show();

        // Ketika tombol simpan ditekan
        Telegram.WebApp.onEvent('mainButtonClicked', function(){
            const data = {
                tanggal: document.getElementById("tanggal").value,
                kategori: document.getElementById("kategori").value,
                keterangan: document.getElementById("keterangan").value,
                pemasukan: document.getElementById("pemasukan").value,
                pengeluaran: document.getElementById("pengeluaran").value,
                saldo: document.getElementById("saldo").value
            };

            // Validasi sederhana
            if(!data.tanggal || !data.keterangan || !data.saldo){
                tg.showAlert("Mohon lengkapi semua data!");
                return;
            }

            // Mengirim data kembali ke bot Python sebagai string JSON
            tg.sendData(JSON.stringify(data));
        });
    </script>
</body>
</html>
