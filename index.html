<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Catat Kas</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f4; }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background-color: #0088cc; color: white; border: none; font-weight: bold; padding: 12px; font-size: 16px; }
        .mode-edit { background-color: #ff9800; }
    </style>
</head>
<body>
    <h3 id="judul_form">Catat Keuangan Baru</h3>
    
    <label>Tanggal:</label>
    <input type="date" id="tanggal">

    <label>Kategori:</label>
    <select id="kategori">
        <option value="ATK">ATK</option>
        <option value="Konsumsi">Konsumsi</option>
        <option value="Transport">Transport</option>
        <option value="Operasional">Operasional</option>
        <option value="Kegiatan Dakwah">Kegiatan Dakwah</option>
        <option value="Sewa">Sewa</option>
        <option value="Lainnya">Lainnya</option>
    </select>

    <label>Keterangan:</label>
    <input type="text" id="keterangan" placeholder="Masukkan keterangan...">

    <label>Pemasukan (Rp):</label>
    <input type="number" id="pemasukan" placeholder="0">

    <label>Pengeluaran (Rp):</label>
    <input type="number" id="pengeluaran" placeholder="0">

    <button id="btn_simpan" onclick="sendData()">Simpan Data</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const editRow = urlParams.get('row');

        if (editRow) {
            // --- MODE EDIT ---
            document.getElementById('judul_form').innerText = "✏️ Edit Baris " + editRow;
            document.getElementById('btn_simpan').innerText = "Update Data";
            document.getElementById('btn_simpan').classList.add('mode-edit');
            
            let tglEdit = urlParams.get('tanggal');
            // Menyesuaikan format DD-MM-YYYY ke format kalender YYYY-MM-DD
            if (tglEdit && tglEdit.includes('-')) {
                let parts = tglEdit.split('-');
                if (parts[0].length === 2) { 
                    document.getElementById('tanggal').value = `${parts[2]}-${parts[1]}-${parts[0]}`;
                } else {
                    document.getElementById('tanggal').value = tglEdit.substring(0, 10);
                }
            }
            
            document.getElementById('kategori').value = urlParams.get('kategori') || 'ATK';
            document.getElementById('keterangan').value = urlParams.get('keterangan') || '';
            document.getElementById('pemasukan').value = urlParams.get('pemasukan') || '0';
            document.getElementById('pengeluaran').value = urlParams.get('pengeluaran') || '0';
        } else {
            // --- MODE INPUT BARU ---
            // Otomatis mengisi kalender dengan hari ini
            let today = new Date();
            let yyyy = today.getFullYear();
            let mm = String(today.getMonth() + 1).padStart(2, '0');
            let dd = String(today.getDate()).padStart(2, '0');
            document.getElementById('tanggal').value = `${yyyy}-${mm}-${dd}`;
        }

                function sendData() {
            let tglInput = document.getElementById('tanggal').value;
            let tglKirim = tglInput; 
            if (tglInput && tglInput.includes('-')) {
                let p = tglInput.split('-');
                if (p[0].length === 4) {
                    tglKirim = `${p[2]}-${p[1]}-${p[0]}`; 
                }
            }

            // MENGAMBIL ANGKA PEMASUKAN & PENGELUARAN
            let nominalMasuk = Number(document.getElementById('pemasukan').value) || 0;
            let nominalKeluar = Number(document.getElementById('pengeluaran').value) || 0;

            // 🚨 SATPAM PENGECEK: JIKA KEDUANYA KOSONG ATAU NOL
            if (nominalMasuk === 0 && nominalKeluar === 0) {
                // Munculkan notifikasi bawaan Telegram
                tg.showAlert("⚠️ Tunggu dulu! Pemasukan atau Pengeluaran wajib diisi salah satu.");
                return; // 🛑 Berhenti di sini! Form tidak akan ditutup dan data tidak dikirim
            }

            const data = {
                action: editRow ? 'edit' : 'new',
                row: editRow,
                tanggal: tglKirim,
                // Kategori: document.getElementById('kategori').value, // (Abaikan jika tabel Anda yang tanpa kategori)
                keterangan: document.getElementById('keterangan').value,
                pemasukan: nominalMasuk,
                pengeluaran: nominalKeluar
            };

            tg.sendData(JSON.stringify(data));
            tg.close();
        }

    </script>
</body>
</html>
