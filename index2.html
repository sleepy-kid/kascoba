<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Kas Masjid</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h3 { text-align: center; color: #333; }
        label { font-weight: bold; display: block; margin-top: 15px; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; background-color: #28a745; color: white; padding: 12px; margin-top: 20px; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <h3>🕌 Input Kas Masjid</h3>
        
        <input type="hidden" id="jenis_kas" value="kos">

        <label>Tanggal:</label>
        <input type="date" id="tanggal_input" required>

        <label>Keterangan:</label>
        <input type="text" id="keterangan" placeholder="Contoh: Infaq Jumat" required>

        <label>Pemasukan (Rp):</label>
        <input type="number" id="pemasukan" placeholder="0">

        <label>Pengeluaran (Rp):</label>
        <input type="number" id="pengeluaran" placeholder="0">

        <button onclick="kirimKeBot()">Simpan Data</button>
    </div>

    <script>
        // Menyiapkan Telegram Web App
        let tg = window.Telegram.WebApp;
        tg.expand(); // Membuat form terbuka penuh di layar HP

        function kirimKeBot() {
            // Mengambil semua nilai dari kotak isian, termasuk yang tersembunyi
            let jenis = document.getElementById("jenis_kas").value;
            let tanggal = document.getElementById("tanggal_input").value;
            let ket = document.getElementById("keterangan").value;
            let masuk = document.getElementById("pemasukan").value || "0";
            let keluar = document.getElementById("pengeluaran").value || "0";

            // Peringatan jika tanggal atau keterangan kosong
            if (!tanggal || !ket) {
                tg.showAlert("Tanggal dan Keterangan wajib diisi!");
                return;
            }

            // Membungkus data untuk dikirim ke Python
            let dataDikirim = {
                jenis_kas: jenis,
                tanggal_input: tanggal,
                keterangan: ket,
                pemasukan: masuk,
                pengeluaran: keluar
            };

            // Mengirim data dan menutup form
            tg.sendData(JSON.stringify(dataDikirim));
            tg.close();
        }
    </script>

</body>
</html>
