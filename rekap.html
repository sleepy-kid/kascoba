<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Bolo Order</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="bg-gray-100 p-4 font-sans">
    <div class="max-w-md mx-auto">
        <div class="mb-6 text-center">
            <h1 class="text-2xl font-bold text-gray-800">📊 Laporan Penjualan</h1>
            <p class="text-gray-500 text-sm" id="teks-bulan">Periode: Menghitung...</p>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-white rounded-xl shadow p-4 border-l-4 border-blue-500">
                <p class="text-xs text-gray-500 font-bold">TOTAL OMZET</p>
                <p id="teks-omzet" class="text-lg font-extrabold text-gray-800">Loading...</p>
            </div>
            <div class="bg-white rounded-xl shadow p-4 border-l-4 border-green-500">
                <p class="text-xs text-gray-500 font-bold">TOTAL MARGIN</p>
                <p id="teks-margin" class="text-lg font-extrabold text-gray-800">Loading...</p>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow p-4 mb-6">
            <h2 class="text-sm font-bold text-gray-700 mb-2">📈 Tren 5 Bulan Terakhir</h2>
            <canvas id="lineChart" height="200"></canvas>
        </div>
        
        <div class="bg-white rounded-xl shadow p-4 mb-6">
            <h2 class="text-sm font-bold text-gray-700 mb-2">🏆 Top 5 Performa Sales</h2>
            <canvas id="barChart" height="220"></canvas>
        </div>
    </div>

    <script>
        function formatRupiah(angka) {
            let number_string = angka.toString().replace(/[^,\d]/g, ''),
                split = number_string.split(','),
                sisa = split[0].length % 3,
                rupiah = split[0].substr(0, sisa),
                ribuan = split[0].substr(sisa).match(/\d{3}/gi);
            if (ribuan) {
                let separator = sisa ? '.' : '';
                rupiah += separator + ribuan.join('.');
            }
            return 'Rp ' + rupiah;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const dataOmzet = urlParams.get('omzet');
        const dataMargin = urlParams.get('margin');
        
        const dataLbl5 = urlParams.get('lbl5');
        const dataVal5 = urlParams.get('val5');
        const dataMar5 = urlParams.get('mar5'); // Margin 5 Bulan
        
        const dataSlbl = urlParams.get('slbl');
        const dataSval = urlParams.get('sval');
        const dataSmar = urlParams.get('smar'); // Margin Sales

        if (dataOmzet && dataMargin) {
            document.getElementById('teks-omzet').innerText = formatRupiah(dataOmzet);
            document.getElementById('teks-margin').innerText = formatRupiah(dataMargin);
            
            // Mengambil info bulan langsung dari link yang dikirim bot
            const d = new Date();
            const namaBulan = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
            let bulanDitampilkan = `${namaBulan[d.getMonth()]} ${d.getFullYear()}`;
            
            if(dataLbl5) {
                let listBulan = dataLbl5.split(',');
                bulanDitampilkan = listBulan[listBulan.length - 1]; // Ambil nama bulan paling ujung kanan
            }
            document.getElementById('teks-bulan').innerText = `Data: ${bulanDitampilkan}`;
        }

        // --- 1. MENGGAMBAR LINE CHART (OMZET VS MARGIN) ---
        let lineLabels = ['Bulan 1', 'Bulan 2', 'Bulan 3', 'Bulan 4', 'Bulan 5']; 
        let lineDataOmzet = [0, 0, 0, 0, 0];
        let lineDataMargin = [0, 0, 0, 0, 0];
        
        if (dataLbl5) {
            lineLabels = dataLbl5.split(','); 
            lineDataOmzet = dataVal5.split(',');
            lineDataMargin = dataMar5.split(',');
        }
        
        new Chart(document.getElementById('lineChart').getContext('2d'), {
            type: 'line',
            data: { 
                labels: lineLabels, 
                datasets: [
                    { 
                        label: 'Omzet', 
                        data: lineDataOmzet, 
                        borderColor: 'rgb(59, 130, 246)', 
                        backgroundColor: 'rgba(59, 130, 246, 0.1)', 
                        borderWidth: 2, fill: true, tension: 0.4 
                    },
                    { 
                        label: 'Margin', 
                        data: lineDataMargin, 
                        borderColor: 'rgb(34, 197, 94)', 
                        backgroundColor: 'rgba(34, 197, 94, 0.1)', 
                        borderWidth: 2, fill: true, tension: 0.4 
                    }
                ] 
            },
            options: { responsive: true, plugins: { tooltip: { callbacks: { label: function(c) { return c.dataset.label + ': ' + formatRupiah(c.parsed.y); } } } } }
        });

        // --- 2. MENGGAMBAR BAR CHART (OMZET VS MARGIN KARYAWAN) ---
        let barLabels = ['Belum Ada Data']; 
        let barDataOmzet = [0];
        let barDataMargin = [0];
        
        if (dataSlbl && dataSval) {
            barLabels = dataSlbl.split(','); 
            barDataOmzet = dataSval.split(',');
            barDataMargin = dataSmar.split(',');
        }
        
        new Chart(document.getElementById('barChart').getContext('2d'), {
            type: 'bar',
            data: {
                labels: barLabels,
                datasets: [
                    { 
                        label: 'Omzet', 
                        data: barDataOmzet, 
                        backgroundColor: 'rgba(59, 130, 246, 0.8)', // Biru
                        borderRadius: 4
                    },
                    { 
                        label: 'Margin', 
                        data: barDataMargin, 
                        backgroundColor: 'rgba(34, 197, 94, 0.8)', // Hijau
                        borderRadius: 4
                    }
                ]
            },
            options: { 
                responsive: true,
                plugins: { tooltip: { callbacks: { label: function(c) { return c.dataset.label + ': ' + formatRupiah(c.parsed.y); } } } }
            }
        });
    </script>
</body>
</html>
